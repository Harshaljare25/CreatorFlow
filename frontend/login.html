<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorFlow - Sign In / Register</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background: radial-gradient(circle at 10% 20%, #f8fafc 0%, #cbd5e1 100%); min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;">
    <!-- Authentication Screen standalone container -->
    <div id="auth-screen" class="auth-screen active" style="position: relative; background: none; height: auto; min-height: auto; width: 100%; display: flex; justify-content: center; align-items: center;">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-square-poll-horizontal auth-logo-icon"></i>
                <span class="auth-logo-text">CreatorFlow</span>
                <p class="auth-subtitle">Log in or create an account to sync your suite</p>
            </div>
            
            <!-- Tabs for Login / Signup -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Sign In</button>
                <button class="auth-tab" id="tab-signup">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="btn-login-submit">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner" style="display:none;"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
                </button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="signup-name">Channel / Business Name</label>
                    <input type="text" id="signup-name" placeholder="E.g., Tech Media" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password (min 6 chars)</label>
                    <input type="password" id="signup-password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="btn-signup-submit">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner" style="display:none;"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
                </button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <!-- Google Sign-In -->
            <button class="btn btn-secondary btn-block google-auth-btn" id="btn-google-auth">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google Logo" class="google-icon-img">
                Sign In with Google
            </button>
            
            <div id="auth-error-msg" class="auth-error-message" style="display:none;"></div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
